  <div class="ddb-section ddb-half">
    <h2 class="ddb-section-title">Spellcasting</h2>
    <div class="ddb-spell-header">
      <div><span class="ddb-label">Ability</span> {{spellcasting_ability}}</div>
      <div><span class="ddb-label">Save DC</span> {{spell_save_dc}}</div>
      <div><span class="ddb-label">Attack</span> {{spell_attack}}</div>

    <h3 class="ddb-subsection-title">Spells Prepared / Known</h3>
    <div class="ddb-block">{{spells_prepared}}</div>
  </div>
