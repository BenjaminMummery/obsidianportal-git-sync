openapi: 3.1.0
info:
  title: Sindrel Lore Bridge
  version: 0.5.3
  description: Live lore retrieval and Git-backed sync bridge for an Obsidian Portal campaign wiki and characters.
servers:
  - url: https://YOUR_DEPLOYED_DOMAIN_HERE
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
paths:
  /:
    get:
      operationId: root
      summary: Human-friendly status page (HTML in browsers, JSON otherwise).
      security: []
      responses:
        '200': { description: OK }
  /health:
    get:
      operationId: health
      summary: Public bridge status. Pass Bearer token for extra cache details.
      security: []
      responses:
        '200': { description: OK }
  /search_lore:
    get:
      operationId: searchLore
      summary: Search live Obsidian Portal lore metadata, optionally full text.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 8, minimum: 1, maximum: 20 }
        - name: include_full_text
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200': { description: Search results }
  /get_page:
    get:
      operationId: getPage
      summary: Fetch one Obsidian Portal wiki page by UUID or slug.
      parameters:
        - name: id_or_slug
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Page }
  /recent_changes:
    get:
      operationId: recentChanges
      summary: Return recently changed Obsidian Portal wiki pages.
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 10, minimum: 1, maximum: 30 }
      responses:
        '200': { description: Recent pages }
  /sync/from-portal:
    post:
      operationId: syncFromPortal
      summary: Pull latest Obsidian Portal wiki pages and characters into the configured GitHub repo.
      parameters:
        - name: async
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200': { description: Sync result }
        '202': { description: Async job started }
  /sync/publish-main:
    post:
      operationId: publishMain
      summary: Pull Obsidian Portal first, then publish changed Textile files from GitHub main back to Obsidian Portal wiki pages and characters.
      parameters:
        - name: async
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200': { description: Publish result }
        '202': { description: Async job started }
  /sync/jobs/current:
    get:
      operationId: syncJobCurrent
      summary: Return the currently running sync job, if any.
      responses:
        '200': { description: Job status }
        '404': { description: No active job }
  /sync/jobs/{job_id}:
    get:
      operationId: syncJobStatus
      summary: Poll progress and result for a sync job.
      parameters:
        - name: job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Job status }
        '404': { description: Unknown job }
  /diff/repo-vs-portal:
    get:
      operationId: diffRepoVsPortal
      summary: Show a unified diff between a repo Textile file and its current Obsidian Portal page.
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: Diff }
