[project]
name = "lore-bridge"
dynamic = ["version"]
description = "Obsidian Portal ↔ GitHub lore sync bridge"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "requests==2.32.3",
    "requests-oauthlib==2.0.0",
    "python-dotenv==1.0.1",
    "beautifulsoup4==4.12.3",
    "rapidfuzz==3.11.0",
    "PyYAML==6.0.2",
    "typer>=0.15.0",
]

[project.scripts]
lore-bridge = "lore_bridge.cli:main"

[dependency-groups]
dev = [
    "pre-commit>=3.5.0",
    "python-semantic-release>=10.5.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lore_bridge"]

[tool.hatch.version]
path = "src/lore_bridge/__init__.py"

########## RELEASE TOOLS ##########

[tool.semantic_release]
assets = []
commit_message = "build: {version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
tag_format = "v{version}"
version_variables = ["src/lore_bridge/__init__.py:__version__"]
build_command = "uv build"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false

[tool.semantic_release.remote.token]
env = "GH_TOKEN"

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true
